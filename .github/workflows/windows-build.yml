name: build-windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenInvertFilter
          path: build/Release/ScreenInvertFilter.exe
      - name: Commit exe to repository
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path build\Release\ScreenInvertFilter.exe -Destination dist\ScreenInvertFilter.exe -Force
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"
          git add -f dist\ScreenInvertFilter.exe
          if (git diff --cached --quiet) {
            echo "No changes to commit"
          } else {
            git commit -m "chore: add built exe [skip ci]"
            git push origin HEAD:main
          }
